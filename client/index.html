<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flask CRUD + AI Demo</title>
    <style>
      .img-box img {
        width: 300px;
        margin-top: 10px;
        border-radius: 8px;
        border: 1px solid #ddd;
      }
    </style>
    <style>
      .calculator {
        margin-top: 20px;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 8px;
        width: 250px;
      }
      .calculator input {
        width: 100%;
        margin-bottom: 10px;
        padding: 10px;
        font-size: 1.2rem;
        box-sizing: border-box;
      }
      .calc-buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 5px;
      }
      .calc-buttons button {
        padding: 10px;
        font-size: 1rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h2>Create Task</h2>
    <form>
      <input type="text" id="title" placeholder="title" />
      <button onclick="createTask(event)">create Task</button>
    </form>

    <h2>All Tasks</h2>
    <div id="container">Loading...</div>

    <hr />

    <!-- ------------- GEMINI TEXT GENERATION ------------- -->
    <h2>Generate Text (Gemini)</h2>
    <input type="text" id="geminiPrompt" placeholder="Enter prompt" style="width:300px;">
    <button onclick="generateGeminiText()">Generate</button>

    <p><strong>Result:</strong></p>
    <div id="geminiResult"></div>

    <hr />

    <!-- ------------- HUGGING FACE IMAGE GENERATION ------------- -->
    <h2>Generate Image (HuggingFace)</h2>
    <input type="text" id="imagePrompt" placeholder="Enter image prompt" style="width:300px;">
    <button onclick="generateImage()">Generate Image</button>
    <div class="img-box" id="imageResult"></div>

    <hr />

    <!-- ------------- CALCULATOR ------------- -->
    <h2>Calculator</h2>
    <div class="calculator">
      <input type="text" id="calcDisplay" readonly />
      <div class="calc-buttons">
        <button onclick="clearDisplay()">C</button>
        <button onclick="appendToDisplay('/')">/</button>
        <button onclick="appendToDisplay('*')">*</button>
        <button onclick="backspace()">Del</button>
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button>
        <button onclick="appendToDisplay('-')">-</button>
        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button onclick="appendToDisplay('+')">+</button>
        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <button onclick="calculateResult()">=</button>
        <button onclick="appendToDisplay('0')" style="grid-column: span 2;">0</button>
        <button onclick="appendToDisplay('.')">.</button>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.10.0/axios.min.js"></script>

    <script>
      const BASE_URL = "http://127.0.0.1:5000";

      // ------------------- CRUD FUNCTIONS ---------------------
      async function createTask(e) {
        e.preventDefault();
        const title = document.getElementById("title").value;

       let result = await axios.post(`${BASE_URL}/tasks`, { title });
       console.log(result.data) 
       fetchData();
      }

      async function fetchData() {
        const container = document.getElementById("container");
        const response = await axios.get(`${BASE_URL}/tasks`);
        console.log(response)
        const data = response.data;

        container.innerHTML = "";

        data.forEach((value, index) => {
          container.innerHTML += `
            <div class="content" style="margin-bottom:15px;">
              <h3>${value.title}</h3>
              <p>Status: ${value.completed}</p>
              <button onclick="update('${value.id}')">Update</button>
              <button onclick="deleted('${value.id}')">Delete</button>
            </div>
          `;
        });
      }

      async function update(id) {
        const title = document.getElementById("title").value;
        await axios.put(`${BASE_URL}/tasks/${id}`, {
          title,
          completed: true,
        });
        fetchData();
      }

      async function deleted(id) {
        await axios.delete(`${BASE_URL}/tasks/${id}`);
        fetchData();
      }

      function loading(status){
        const container = document.getElementById("container");
        if(status == true){
          container.innerHTML = "Loading...";

        }
        else{
          container.innerHTML = "";
        }
      }
      window.onload = fetchData;

      // ------------------- GEMINI TEXT GENERATION ---------------------
      async function generateGeminiText() {
        const prompt = document.getElementById("geminiPrompt").value;
        const resultDiv = document.getElementById("geminiResult");

        resultDiv.innerHTML = "Generating...";

        try {
          const response = await axios.post(`${BASE_URL}/ai/generate-text`, {
            prompt,
          });

          let a = response.data.response
          // let b = a.split(' ')
          // c= ['hi', '<br>','john']
          // console.log(typeof(b))
          resultDiv.innerHTML = a;
        } catch (err) {
          resultDiv.innerHTML = "<p>Error generating text</p>";
        }
      }

      // ------------------- HUGGING FACE IMAGE GENERATION ---------------------
      async function generateImage() {
        const prompt = document.getElementById("imagePrompt").value;
        const imgDiv = document.getElementById("imageResult");

        imgDiv.innerHTML = "Generating image...";

        try {
          const response = await axios.post(`${BASE_URL}/ai/generate-image`, {
            prompt,
          });

          const base64 = response.data.image_base64;

          imgDiv.innerHTML = `
            <img src="data:image/png;base64,${base64}" />
          `;
        } catch (err) {
          imgDiv.innerHTML = "<p>Error generating image</p>";
        }
      }

      // ------------------- CALCULATOR FUNCTIONS ---------------------
      function appendToDisplay(value) {
        document.getElementById("calcDisplay").value += value;
      }

      function clearDisplay() {
        document.getElementById("calcDisplay").value = "";
      }

      function backspace() {
        const display = document.getElementById("calcDisplay");
        display.value = display.value.slice(0, -1);
      }

      function calculateResult() {
        const display = document.getElementById("calcDisplay");
        try {
          display.value = eval(display.value);
        } catch (err) {
          display.value = "Error";
        }
      }
    </script>
  </body>
</html>
